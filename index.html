<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deck of Many Things</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Germania+One&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Deck of Many Things</h1>
  <button id="drawBtn">Draw Card</button>
  <div id="resultContainer"></div>
  
  <script src="cards.js"></script>
  
  <script>
    let remainingCards = [...cards];
    
    const drawTitles = [
      "Party Gathers",
      "Adventure Begins",
      "Journey",
      "Entrance",
      "First Challenge",
      "Second Challenge",
      "Third Challenge",
      "Guardian",
      "Treasure"
    ];
    
    const titleRules = {
      "Party Gathers": ["name", "situation"],
      "Adventure Begins": ["name", "person"],
      "Journey": ["name", "place"],
      "Entrance": ["name", "place"],
      "First Challenge": ["name", "creature"],
      "Second Challenge": ["name", "creature"],
      "Third Challenge": ["name", "creature"],
      "Guardian": ["name", "creature"],
      "Treasure": ["name", "treasure"]
    };
    
    const resultContainer = document.getElementById("resultContainer");
    const button = document.getElementById("drawBtn");
    
    button.addEventListener("click", drawNineCards);
    
    async function drawNineCards() {
      resultContainer.innerHTML = "";
    
      if (remainingCards.length < 9) {
        remainingCards = [...cards];
        alert("Not enough cards left. Reshuffling deck...");
      }
    
      for (let i = 0; i < 9; i++) {
        await drawOneCardAnimated(i);
      }
    }
    
    function drawRandomCard() {
      const index = Math.floor(Math.random() * remainingCards.length);
      return remainingCards.splice(index, 1)[0];
    }
    
    function drawOneCardAnimated(i) {
      return new Promise((resolve) => {
        const cardData = drawRandomCard();
        const title = drawTitles[i];
        const keys = titleRules[title] || ["name"];
    
        const value = keys
          .map(k => cardData[k])
          .filter(Boolean)
          .join("\n");
    
        const parts = value.split("\n");
        const name = parts[0] || "";
        const description = parts.slice(1).join("\n");
    
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.alignItems = "center";
    
        const titleEl = document.createElement("div");
        titleEl.innerText = title;
        titleEl.classList.add("card-label");
    
        const cardEl = document.createElement("div");
        cardEl.classList.add("flip-card");
    
        const inner = document.createElement("div");
        inner.classList.add("flip-inner");
    
        const front = document.createElement("div");
        front.classList.add("card-front");
    
        const img = document.createElement("img");
        img.src = cardData.image || "images/back.webp";
    
        front.appendChild(img);
    
        const back = document.createElement("div");
        back.classList.add("card-back");
    
        back.innerHTML = `
          <div class="card-title">${name}</div>
          <div class="card-text">${description}</div>
        `;
    
        inner.appendChild(front);
        inner.appendChild(back);
        cardEl.appendChild(inner);
    
        cardEl.addEventListener("click", () => {
          cardEl.classList.toggle("flipped");
        });
    
        wrapper.appendChild(titleEl);
        wrapper.appendChild(cardEl);
        resultContainer.appendChild(wrapper);
    
        setTimeout(() => {
          resolve();
        }, 400);
      });
    }
  </script>
</body>
</html>
