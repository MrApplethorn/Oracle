<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Randomizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #1e1e2f;
      color: white;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
      background: #333;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      max-width: 500px;
      transition: transform 0.2s;
    }
    
    #result:hover {
      transform: scale(1.05);
    }
    
    #resultContainer {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .card {
      width: 100px;
      height: 140px;
      background: #444;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      transform: scale(0) rotateY(90deg);
      transition: transform 0.4s ease;
      white-space: pre-line;
    }

    .card.show {
      transform: scale(1) rotateY(0deg);
    }
    
    #resultContainer > div {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <h1>D&D Card Randomizer</h1>
  <button id="drawBtn">Draw Card</button>

  <div id="resultContainer"></div>

  <script>
const drawTitles = [
  "Party Gathers",
  "Adventure Begins",
  "Journey",
  "Entrance",
  "First Challenge",
  "Second Challenge",
  "Third Challenge",
  "Guardian",
  "Treasure"
];

const cards = [
  { name: "Aberration", effect: "" },
  { name: "Balance", effect: "" },
  { name: "Beast", effect: "" },
  { name: "Book", effect: "" },
  { name: "Bridge", effect: "" },
  { name: "Campfire", effect: "" },
  { name: "Cavern", effect: "" },
  { name: "Celestial", effect: "" },
  { name: "Comet", effect: "" },
  { name: "Construct", effect: "" },
  { name: "Corpse", effect: "" },
  { name: "Crossroads", effect: "" },
  { name: "Donjon", effect: "" },
  { name: "Door", effect: "" },
  { name: "Dragon", effect: "" },
  { name: "Elemental", effect: "" },
  { name: "Euryale", effect: "" },
  { name: "Expert", effect: "" },
  { name: "Fates", effect: "" },
  { name: "Fey", effect: "" },
  { name: "Fiend", effect: "" },
  { name: "Flames", effect: "" },
  { name: "Fool", effect: "" },
  { name: "Gem", effect: "" },
  { name: "Giant", effect: "" },
  { name: "Humanoid", effect: "" },
  { name: "Jester", effect: "" },
  { name: "Key", effect: "" },
  { name: "Knight", effect: "" },
  { name: "Mage", effect: "" },
  { name: "Maze", effect: "" },
  { name: "Moon", effect: "" },
  { name: "Ooze", effect: "" },
  { name: "Path", effect: "" },
  { name: "Pit", effect: "" },
  { name: "Priest", effect: "" },
  { name: "Rogue", effect: "" },
  { name: "Ruin", effect: "" },
  { name: "Sage", effect: "" },
  { name: "Skull", effect: "" },
  { name: "Sun", effect: "" },
  { name: "Temple", effect: "" },
  { name: "Throne", effect: "" },
  { name: "Tower", effect: "" },
  { name: "Tree", effect: "" },
  { name: "Undead", effect: "" },
  { name: "Void", effect: "" },
  { name: "Warrior", effect: "" }
];

let remainingCards = [...cards];

const resultContainer = document.getElementById("resultContainer");
const button = document.getElementById("drawBtn");

button.addEventListener("click", drawNineCards);

async function drawNineCards() {
  resultContainer.innerHTML = "";

  if (remainingCards.length < 9) {
    remainingCards = [...cards];
    alert("Not enough cards left. Reshuffling deck...");
  }

  for (let i = 0; i < 9; i++) {
    await drawOneCardAnimated(i);
  }
}

function drawRandomCard() {
  const index = Math.floor(Math.random() * remainingCards.length);
  return remainingCards.splice(index, 1)[0];
}

function drawOneCardAnimated(i) {
  return new Promise((resolve) => {
    const cardData = drawRandomCard();
    const title = drawTitles[i] || "";

    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.flexDirection = "column";
    wrapper.style.alignItems = "center";

    const titleEl = document.createElement("div");
    titleEl.innerText = title;
    titleEl.style.marginBottom = "8px";
    titleEl.style.fontSize = "14px";
    titleEl.style.opacity = "0.8";

    const cardEl = document.createElement("div");
    cardEl.classList.add("card");
    cardEl.innerText = cardData.effect
      ? `${cardData.name}\n${cardData.effect}`
      : cardData.name;

    wrapper.appendChild(titleEl);
    wrapper.appendChild(cardEl);
    resultContainer.appendChild(wrapper);

    setTimeout(() => {
      cardEl.classList.add("show");
    }, 50);

    setTimeout(resolve, 400);
  });
}
  </script>
</body>
</html>
