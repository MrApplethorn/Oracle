<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deck of Many Thingsr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Germania+One&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Germania One', sans-serif;
      text-align: center;
      padding: 50px;
      background: #1e1e2f;
      color: white;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    #result {
      margin-top: 30px;
      font-size: 20px;
      background: #333;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      max-width: 500px;
      transition: transform 0.2s;
    }
    #result:hover {
      transform: scale(1.05);
    }
    #resultContainer {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }
    .card {
      width: 180px;
      min-height: 200px;
      background: #444;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 15px;
      font-size: 13px;
      transform: scale(0) rotateY(90deg);
      transition: transform 0.4s ease;
      white-space: pre-line;
      overflow-y: auto;
    }
    .card.show {
      transform: scale(1) rotateY(0deg);
    }
    #resultContainer > div {
      margin-bottom: 15px;
    }
    .flip-card {
      width: 260px;
      height: 450px;
      perspective: 1000px;
      cursor: pointer;
    }
    
    .flip-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }
    
    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }
    
    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      top: 0;
      left: 0;
    }
    
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-back {
      background: #444;
      color: white;
      transform: rotateY(180deg);
      padding: 10px;
      box-sizing: border-box;
    }
    }
    .flip-card:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <h1>Deck of Many Things</h1>
  <button id="drawBtn">Draw Card</button>
  <div id="resultContainer"></div>
  
  <script src="cards.js"></script>
  
  <script>
    let remainingCards = [...cards];
    
    const drawTitles = [
      "Party Gathers",
      "Adventure Begins",
      "Journey",
      "Entrance",
      "First Challenge",
      "Second Challenge",
      "Third Challenge",
      "Guardian",
      "Treasure"
    ];
    
    const titleRules = {
      "Party Gathers": ["name", "situation"],
      "Adventure Begins": ["name", "person"],
      "Journey": ["name", "place"],
      "Entrance": ["name", "place"],
      "First Challenge": ["name", "creature"],
      "Second Challenge": ["name", "creature"],
      "Third Challenge": ["name", "creature"],
      "Guardian": ["name", "creature"],
      "Treasure": ["name", "treasure"]
    };
    
    const resultContainer = document.getElementById("resultContainer");
    const button = document.getElementById("drawBtn");
    
    button.addEventListener("click", drawNineCards);
    
    async function drawNineCards() {
      resultContainer.innerHTML = "";
    
      if (remainingCards.length < 9) {
        remainingCards = [...cards];
        alert("Not enough cards left. Reshuffling deck...");
      }
    
      for (let i = 0; i < 9; i++) {
        await drawOneCardAnimated(i);
      }
    }
    
    function drawRandomCard() {
      const index = Math.floor(Math.random() * remainingCards.length);
      return remainingCards.splice(index, 1)[0];
    }
    
    function drawOneCardAnimated(i) {
      return new Promise((resolve) => {
        const cardData = drawRandomCard();
        const title = drawTitles[i];
        const keys = titleRules[title] || ["name"];
    
        const value = keys
          .map(k => cardData[k])
          .filter(Boolean)
          .join("\n");
    
        const parts = value.split("\n");
        const name = parts[0] || "";
        const description = parts.slice(1).join("\n");
    
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.alignItems = "center";
    
        const titleEl = document.createElement("div");
        titleEl.innerText = title;
        titleEl.style.marginBottom = "8px";
        titleEl.style.fontSize = "14px";
        titleEl.style.opacity = "0.8";
    
        const cardEl = document.createElement("div");
        cardEl.classList.add("flip-card");
    
        const inner = document.createElement("div");
        inner.classList.add("flip-inner");
    
        const front = document.createElement("div");
        front.classList.add("card-front");
    
        const img = document.createElement("img");
        img.src = cardData.image || "images/back.webp";
    
        front.appendChild(img);
    
        const back = document.createElement("div");
        back.classList.add("card-back");
    
        back.innerHTML = `
          <div style="font-size:16px; font-weight:bold; margin-bottom:8px;">
            ${name}
          </div>
          <div style="font-size:12px;">
            ${description}
          </div>
        `;
    
        inner.appendChild(front);
        inner.appendChild(back);
        cardEl.appendChild(inner);
    
        cardEl.addEventListener("click", () => {
          cardEl.classList.toggle("flipped");
        });
    
        wrapper.appendChild(titleEl);
        wrapper.appendChild(cardEl);
        resultContainer.appendChild(wrapper);
    
        setTimeout(() => {
          resolve();
        }, 400);
      });
    }
  </script>
</body>
</html>
